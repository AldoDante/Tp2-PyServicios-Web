<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contacto</title>
    <link rel="stylesheet" href="../Styles/contacto.css" />
    <link rel="stylesheet" href="../Styles/header.css" />
    <link rel="stylesheet" href="../Styles/footer.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <header class="header">
        
            
    </header>
 <main>
<section id="contacto" class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
      <h2 class="mb-4 text-center">Contacto</h2>
      
      <form id="formularioContacto" class="needs-validation" novalidate>
        
        <div class="form-floating mb-3">
          <input type="text" class="form-control" id="nombre" name="nombre" placeholder="Nombre" required>
          <label for="nombre">Nombre</label>
          <div class="invalid-feedback">Por favor, ingresa un nombre válido (mínimo 3 letras).</div>
        </div>

        <div class="form-floating mb-3">
          <input type="email" class="form-control" id="email" name="email" placeholder="name@example.com" required>
          <label for="email">E-Mail</label>
          <div class="invalid-feedback">Ingresa un correo electrónico válido.</div>
        </div>

        <div class="form-floating mb-3">
          <textarea class="form-control" id="mensaje" name="mensaje" placeholder="Mensaje" style="height: 100px" required></textarea>
          <label for="mensaje">Mensaje</label>
          <div class="invalid-feedback">El mensaje no puede estar vacío.</div>
        </div>

        <button type="submit" id="btnEnviar" class="btn btn-primary w-100">
          <span id="spinnerCarga" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
          <span id="textoBoton">Enviar Mensaje</span>
        </button>
      </form>
    </div>
  </div>
</section>

<div class="modal fade" id="modalConfirmacion" tabindex="-1" aria-labelledby="modalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header bg-success text-white">
        <h5 class="modal-title" id="modalLabel">Mensaje Enviado</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
       Un Asesor se pondra en contacto con Ud a la brevedad.
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
      </div>
    </div>
  </div>
</div>
 </main>
     
<footer>

</footer>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/contacto.js"></script>
  </body>
</html>
