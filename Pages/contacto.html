<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contacto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../Styles/contacto.css" />
    <link rel="stylesheet" href="../Styles/header.css" />
    <link rel="stylesheet" href="../Styles/footer.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  </head>
  <body>
    <header class="header">
        
            
    </header>
 <main>
<section id="contacto" class="container mt-5 mb-5">    
    <div class="row shadow bg-white rounded-4 overflow-hidden">        
          <div class="col-12 col-md-5 p-0">
            <img src="../Images/hornocal-2.jpg" alt="Serranía del Hornocal - Jujuy" class="imagen-lateral-contacto">
          </div>

        <div class="col-12 col-md-7 p-4 p-md-5 align-self-center">            
            <h2 class="fw-bold mb-4 titulo-tierra">Contacto</h2>
            <form id="formularioContacto" class="needs-validation" novalidate>                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <div class="form-floating">
                            <input type="text" class="form-control" id="nombre" name="nombre" placeholder="Juan Pérez" required>
                            <label for="nombre">Nombre</label>
                            <div class="invalid-feedback">Mínimo 3 letras.</div>
                        </div>
                    </div>                    
                    <div class="col-md-6 mb-3">
                        <div class="form-floating">
                            <input type="email" class="form-control" id="email" name="email" placeholder="nombre@ejemplo.com" required>
                            <label for="email">Email</label>
                            <div class="invalid-feedback">Correo electrónico inválido.</div>
                        </div>
                    </div>
                </div>
                <div class="form-floating mb-4">
                    <textarea class="form-control" id="mensaje" name="mensaje" placeholder="Déjanos tu mensaje" style="height: 150px" required></textarea>
                    <label for="mensaje">Mensaje</label>
                    <div class="invalid-feedback">El mensaje no puede estar vacío.</div>
                </div>
                <button type="submit" class="btn btn-tierra w-100 fw-bold py-3" id="btnEnviarContacto">
                    <span id="spinnerCarga" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                    <span id="textoBoton">Enviar Consulta</span>
                </button>
            </form>
        </div>
    </div>
</section>

<div class="modal fade" id="modalConfirmacion" tabindex="-1" aria-labelledby="modalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header bg-success text-white">
        <h5 class="modal-title" id="modalLabel">Mensaje Enviado</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
       Un Asesor se pondra en contacto con Ud a la brevedad.
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
      </div>
    </div>
  </div>
</div>
 </main>
     
<footer>

</footer>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/contacto.js"></script>
  </body>
</html>
